<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joji Shiotsuki | Developer & Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Anti-flash: apply stored theme before paint -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
            if (t === 'light') {
              document.documentElement.style.setProperty('--black', '#FFFFFF');
              document.documentElement.style.setProperty('--cream', '#2A2A28');
            }
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <style>
      :root {
        --black: #0F1A2E;
        --charcoal: #1B2A4A;
        --graphite: #1B2A4A;
        --cream: #F7F7F5;
        --cream-muted: #D4D4D0;
        --cyan: #E8A317;
        --cyan-dim: #E8A31733;
        --coral: #F5B731;
        --coral-dim: #F5B73133;

        --font-display: 'Bricolage Grotesque', sans-serif;
        --font-body: 'Instrument Sans', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        overflow-x: hidden;
      }

      body {
        font-family: var(--font-display);
        background: var(--black);
        color: var(--cream);
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
      }

      #root {
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
      }

      ::selection {
        background: var(--cyan);
        color: var(--black);
      }

      /* Grain overlay */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
        z-index: 9999;
      }

      /* Smooth theme transitions */
      body * {
        transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--black);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--cyan);
      }

      /* Light mode grain */
      [data-theme="light"] body::before {
        opacity: 0.015;
      }

      /* Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes glitch {
        0%, 100% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(2deg); }
      }

      .animate-in {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
      }

      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      .delay-4 { animation-delay: 0.4s; }
      .delay-5 { animation-delay: 0.5s; }
      .delay-6 { animation-delay: 0.6s; }
    </style>
    <script type="module" crossorigin src="/assets/index-bozhFHK2.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
