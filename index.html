    <!-- Anti-flash: apply stored theme before paint -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
            if (t === 'light') {
              document.documentElement.style.setProperty('--bg-primary', '#FFFFFF');
              document.documentElement.style.setProperty('--text-primary', '#2A2820');
              document.documentElement.style.setProperty('--bg-secondary', '#EBE8E2');
              document.documentElement.style.setProperty('--bg-tertiary', '#EBE8E2');
              document.documentElement.style.setProperty('--accent', '#5F7161');
              document.documentElement.style.setProperty('--accent-dim', 'rgba(95, 113, 97, 0.15)');
              document.documentElement.style.setProperty('--accent-secondary', '#8D9A7C');
              document.documentElement.style.setProperty('--accent-secondary-dim', '#8D9A7C33');
              document.documentElement.style.setProperty('--text-muted', '#9C9890');
            } else {
              document.documentElement.style.setProperty('--bg-primary', '#0C0F14');
              document.documentElement.style.setProperty('--text-primary', '#F5F3EE');
              document.documentElement.style.setProperty('--bg-secondary', '#293122');
              document.documentElement.style.setProperty('--bg-tertiary', '#293122');
              document.documentElement.style.setProperty('--accent', '#8D9A7C');
              document.documentElement.style.setProperty('--accent-dim', 'rgba(141, 154, 124, 0.2)');
              document.documentElement.style.setProperty('--accent-secondary', '#C3C9A5');
              document.documentElement.style.setProperty('--accent-secondary-dim', '#C3C9A533');
              document.documentElement.style.setProperty('--text-muted', 'rgba(245, 243, 238, 0.35)');
            }
          } else {
            document.documentElement.setAttribute('data-theme', 'light');
            document.documentElement.style.setProperty('--bg-primary', '#FFFFFF');
            document.documentElement.style.setProperty('--text-primary', '#2A2820');
            document.documentElement.style.setProperty('--bg-secondary', '#EBE8E2');
            document.documentElement.style.setProperty('--bg-tertiary', '#EBE8E2');
            document.documentElement.style.setProperty('--accent', '#5F7161');
            document.documentElement.style.setProperty('--accent-dim', 'rgba(95, 113, 97, 0.15)');
            document.documentElement.style.setProperty('--accent-secondary', '#8D9A7C');
            document.documentElement.style.setProperty('--accent-secondary-dim', '#8D9A7C33');
            document.documentElement.style.setProperty('--text-muted', '#9C9890');
          }
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.style.setProperty('--bg-primary', '#FFFFFF');
          document.documentElement.style.setProperty('--text-primary', '#2A2820');
          document.documentElement.style.setProperty('--bg-secondary', '#EBE8E2');
          document.documentElement.style.setProperty('--bg-tertiary', '#EBE8E2');
          document.documentElement.style.setProperty('--accent', '#5F7161');
          document.documentElement.style.setProperty('--accent-dim', 'rgba(95, 113, 97, 0.15)');
          document.documentElement.style.setProperty('--accent-secondary', '#8D9A7C');
          document.documentElement.style.setProperty('--accent-secondary-dim', '#8D9A7C33');
          document.documentElement.style.setProperty('--text-muted', '#9C9890');
        }
      })();
    </script>
    <style>
      :root {
        --bg-primary: #FFFFFF;
        --bg-secondary: #EBE8E2;
        --bg-tertiary: #EBE8E2;
        --text-primary: #2A2820;
        --text-muted: #9C9890;
        --accent: #5F7161;
        --accent-dim: rgba(95, 113, 97, 0.15);
        --accent-secondary: #8D9A7C;
        --accent-secondary-dim: #8D9A7C33;

        --font-display: 'Bricolage Grotesque', sans-serif;
        --font-body: 'Instrument Sans', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        overflow-x: hidden;
      }

      body {
        font-family: var(--font-display);
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
      }

      #root {
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
      }

      ::selection {
        background: var(--accent);
        color: var(--bg-primary);
      }

      /* Grain overlay */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
        z-index: 50;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent);
      }

      /* Light mode grain */
      [data-theme="light"] body::before {
        opacity: 0.015;
      }

      /* Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes glitch {
        0%, 100% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
      }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(2deg); }
      }

      .animate-in {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
      }

      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      .delay-4 { animation-delay: 0.4s; }
      .delay-5 { animation-delay: 0.5s; }
      .delay-6 { animation-delay: 0.6s; }
    </style>
